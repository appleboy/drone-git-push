name: Docker Non-Root Validation

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  validate-non-root:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build binary
        run: make build_linux_amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: drone-git-push:test

      - name: Verify container runs as non-root
        run: |
          USER_NAME=$(docker run --rm --entrypoint "" drone-git-push:test whoami)
          USER_ID=$(docker run --rm --entrypoint "" drone-git-push:test id -u)
          echo "User: $USER_NAME (UID: $USER_ID)"
          if [ "$USER_NAME" = "root" ] || [ "$USER_ID" = "0" ]; then
            echo "ERROR: Container is running as root!"
            exit 1
          fi
          echo "OK: Container runs as non-root user '$USER_NAME'"

      - name: Verify git operations work as non-root
        run: |
          docker run --rm --entrypoint "" drone-git-push:test sh -c "
            cd /tmp &&
            git init test-repo &&
            cd test-repo &&
            git config user.name 'test' &&
            git config user.email 'test@test.com' &&
            echo hello > file.txt &&
            git add . &&
            git commit -m 'test commit'
          "
          echo "OK: Git operations work as non-root"

      - name: Verify home directory and SSH paths
        run: |
          HOME_DIR=$(docker run --rm --entrypoint "" drone-git-push:test sh -c 'echo ~')
          echo "Home directory: $HOME_DIR"
          if [ "$HOME_DIR" = "/root" ]; then
            echo "ERROR: Home directory is /root!"
            exit 1
          fi
          docker run --rm --entrypoint "" drone-git-push:test sh -c "
            mkdir -p ~/.ssh &&
            echo 'test' > ~/.ssh/id_rsa &&
            chmod 600 ~/.ssh/id_rsa &&
            echo 'test' > ~/.netrc &&
            chmod 600 ~/.netrc
          "
          echo "OK: SSH and netrc paths are writable under $HOME_DIR"
